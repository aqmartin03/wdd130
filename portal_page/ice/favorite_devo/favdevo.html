<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
        <table>
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>
          <tr>
            <td>President Merideth</td>
            <td>Preserving the Spirit of Ricks at BYU-Idaho</td>
            <td>I-Center</td>
            <td>2025</td>
          </tr>
          <tr>
            <td>Elder Cuvelier</td>
            <td>A Great Check</td>
            <td>I-Center</td>
            <td>2026</td>
          </tr>
          <tr>
            <td>Brother Shippen</td>
            <td>Become Legendary</td>
            <td>I-Center</td>
            <td>2026</td>
          </tr>
          <tr>
            <form>
              <td><input type="text" id="the_speaker" name="the_speaker"></td>
              <td><input type="text" id="the_title" name="the_title"></td>
              <td><input type="text" id="the_location" name="the_location"></td>
              <td><input type="text" id="the_year" name="the_year"></td>
            </form>
          </tr>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
