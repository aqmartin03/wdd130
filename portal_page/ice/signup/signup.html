<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background: rgb(120, 96, 64);
            font-family: "Times New Roman";
            display: flex;
            align-items: center;
            padding: 20px;
        }

        #top_image {
            width: 500px;
            height: auto;
            display: block;
        }

        h1, h2 {
            position: absolute;
            z-index: 0;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 110px;
        }

        h2 {
            margin-top: 170px;
        }

        #formContainer {
            background-color: white;
            width: 500px;
            position: relative;
            border: solid #021375 10px;
            border-radius: 22px;
            overflow: hidden;
        }

        #closeBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(235, 235, 235, 0.76);
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 3px 10px;
        }

        #scriptures {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            width: 100%;
            gap: 3px;
        }

        #scriptures img {
            width: 100%;
            height: auto;
        }

        h3 {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        #myForm {
            display: grid;
            row-gap: 12px;
            padding: 10px;
        }

        .formRow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: 8px;
        }

        label[for="username"] {
            grid-column: 1/2;
            grid-row: 1/2;
        }

        label[for="password"] {
            grid-column: 1/2;
            grid-row: 2/3;
        }

        label[for="email"] {
            grid-column: 1/2;
            grid-row: 3/4;
        }

        input[type="text"] {
            grid-column: 2/3;
            grid-row: 1/2;
        }

        input[type="password"] {
            grid-column: 2/3;
            grid-row: 2/3;
        }

        input[type="email"] {
            grid-column: 2/3;
            grid-row: 3/4;
        }

    
        .genderRow {
            display: grid;
            grid-template-columns: auto auto auto auto;
            align-items: center;
            gap: 10px;
        }

        #myForm section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px;
            gap: 5px;
        }
        
    </style>
</head>

<body>
    <div id="formContainer">
        <h1>Daily Feed</h1>
        <h2>Scripture a Day</h2>
        <img id="top_image" src="images/jesus_feeds_5000.jpeg" alt="Jesus feeds 5000">
        <h3>Sign Up for Daily Scripture Feed</h3>
        <button type="button" id="closeBtn">X</button>
        <form id="myForm">
            <div class="formRow">
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="formRow">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="formRow">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="formRow">
            <label>Gender:</label>
                <div class="genderRow">
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>

        <nav id="scriptures">
            <img src="images/old_testament.webp" alt="Old Testament">
            <img src="images/new_testament.webp" alt="New Testament">
            <img src="images/book_of_mormon.webp" alt="Book of Mormon">
            <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
            <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
        </nav>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
